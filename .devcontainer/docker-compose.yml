name: devtools
services:
  devcontainer:
    build:
      context: .
      dockerfile: Dockerfile
      extra_hosts:
        - "host.docker.internal:host-gateway"
      args:
        APT_PROXY: "http://host.docker.internal:3142"
    user: developer
    command: bash -c "sudo /usr/sbin/sshd; sleep infinity"
    cap_add:
      - SYS_PTRACE
      - NET_ADMIN
    devices:
      - /dev/net/tun
    ports:
      - "50122:50122"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - persist:/mnt/persist
    security_opt:
      - seccomp:unconfined

  devcontainer-gpu:
    extends:
      service: devcontainer
    profiles:
      - gpu
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  persist:
    name: devtools-persist
